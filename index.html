<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sinha Authentic | Luxury Collection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #FAF9F6; }
        .font-serif { font-family: 'Playfair Display', serif; }
        .backdrop-blur-md { backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
        .price-filter-btn.active { background-color: #18181b; color: white; border-color: #18181b; }
    </style>
</head>
<body>

    <nav class="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-md border-b border-zinc-100">
        <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
            <h1 class="font-serif italic text-xl tracking-tighter text-zinc-900">Sinha Authentic</h1>
            <div class="hidden md:flex space-x-8 text-[9px] uppercase tracking-[0.2em] font-black text-zinc-500">
                <button onclick="window.setCat('todos')" class="category-link hover:text-[#C45508] transition-colors">Ver Tudo</button>
                <button onclick="window.setCat('vestidos')" class="category-link hover:text-[#C45508] transition-colors">Vestidos</button>
                <button onclick="window.setCat('conjuntos')" class="category-link hover:text-[#C45508] transition-colors">Conjuntos</button>
            </div>
            <div class="flex items-center space-x-4">
                <button class="text-zinc-900"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg></button>
            </div>
        </div>
    </nav>

    <section id="produtos" class="pt-24 pb-20">
        <div id="product-grid" class="max-w-7xl mx-auto grid grid-cols-3 lg:grid-cols-4 gap-px bg-zinc-200 border-b border-zinc-200">
            </div>

        <div class="max-w-7xl mx-auto px-4 mt-16 flex flex-col md:flex-row md:items-end justify-between space-y-8 md:space-y-0">
            <div class="text-center md:text-left">
                <span class="uppercase tracking-[0.3em] text-[8px] text-[#C45508] font-black mb-1 block">Luxury Portfolio</span>
                <h2 id="current-category-name" class="text-4xl md:text-6xl font-serif italic text-zinc-900 capitalize text-balance">Acervo Sinha</h2>
            </div>
            
            <div class="flex flex-col items-center md:items-end space-y-3">
                <span class="text-[8px] uppercase tracking-widest font-black text-zinc-400">Filtrar por Valor (MT)</span>
                <div id="price-filters" class="flex flex-wrap justify-center md:justify-end gap-2">
                    <button onclick="window.setPriceRange(0, Infinity, this)" class="price-filter-btn active text-[8px] uppercase tracking-widest font-bold px-4 py-2.5 border border-zinc-200 transition-all">Todos</button>
                    <button onclick="window.setPriceRange(0, 10000, this)" class="price-filter-btn text-[8px] uppercase tracking-widest font-bold px-4 py-2.5 border border-zinc-200 transition-all">Até 10k</button>
                    <button onclick="window.setPriceRange(10000, 20000, this)" class="price-filter-btn text-[8px] uppercase tracking-widest font-bold px-4 py-2.5 border border-zinc-200 transition-all">10k - 20k</button>
                    <button onclick="window.setPriceRange(20000, Infinity, this)" class="price-filter-btn text-[8px] uppercase tracking-widest font-bold px-4 py-2.5 border border-zinc-200 transition-all">Premium</button>
                </div>
            </div>
        </div>
    </section>

    <div id="product-modal-container" class="fixed inset-0 z-[110] bg-white/40 backdrop-blur-md flex items-center justify-center hidden" onclick="window.closeProductModal()">
        <div id="product-modal-content" class="bg-white w-[95%] md:max-w-4xl max-h-[90vh] overflow-y-auto relative p-6 md:p-10 shadow-2xl" onclick="event.stopPropagation()">
            </div>
    </div>

    <script>
        const products = [
            { id: '101', name: 'Vestido Seda Floral', price: 12500, category: 'vestidos', image: 'https://images.unsplash.com/photo-1595777457583-95e059d581b8?w=800' },
            { id: '102', name: 'Conjunto Linen White', price: 18900, category: 'conjuntos', image: 'https://images.unsplash.com/photo-1539109132314-64775a60074c?w=800' },
            { id: '103', name: 'Vestido Noite Velvet', price: 22000, category: 'vestidos', image: 'https://images.unsplash.com/photo-1515372039744-b8f02a3ae446?w=800' },
            // Adicione mais 13 produtos aqui para completar a grelha 4x4 no desktop
        ];

        let currentCategory = 'todos';
        let minPrice = 0;
        let maxPrice = Infinity;
        let wishlist = [];

        const grid = document.getElementById('product-grid');

        function render() {
            let filtered = currentCategory === 'todos' ? products : products.filter(p => p.category === currentCategory);
            filtered = filtered.filter(p => p.price >= minPrice && p.price <= maxPrice);

            grid.innerHTML = filtered.map(p => `
                <div class="group bg-white p-2 md:p-6 border-r border-b border-zinc-200">
                    <div class="relative aspect-[3/4] mb-3 bg-zinc-50 cursor-pointer overflow-hidden" onclick="window.openProductModal('${p.id}')">
                        <img src="${p.image}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-1000">
                    </div>
                    <div class="space-y-1">
                        <h3 class="text-[7px] md:text-[9px] font-black uppercase text-zinc-900 tracking-tighter md:tracking-widest truncate">${p.name}</h3>
                        <p class="text-[#C45508] text-[9px] md:text-xs font-serif italic">${p.price.toLocaleString('pt-MZ')} MT</p>
                        <button onclick="window.openProductModal('${p.id}')" class="w-full bg-zinc-900 text-white py-2 text-[7px] font-black uppercase tracking-widest mt-2 hover:bg-[#C45508] transition-all">Detalhes</button>
                    </div>
                </div>
            `).join('');
        }

        window.setCat = (c) => {
            currentCategory = c;
            render();
            document.getElementById('produtos').scrollIntoView({ behavior: 'smooth' });
        };

        window.setPriceRange = (min, max, btn) => {
            minPrice = min;
            maxPrice = max;
            document.querySelectorAll('.price-filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            render();
        };

        window.openProductModal = (id) => {
            const p = products.find(x => x.id === id);
            const modal = document.getElementById('product-modal-container');
            const content = document.getElementById('product-modal-content');
            
            content.innerHTML = `
                <button onclick="window.closeProductModal()" class="absolute top-4 right-4 text-zinc-400 hover:text-zinc-900">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
                <div class="grid md:grid-cols-2 gap-10">
                    <div class="aspect-[3/4] bg-zinc-100 overflow-hidden">
                        <img src="${p.image}" class="w-full h-full object-cover">
                    </div>
                    <div class="flex flex-col justify-center space-y-6">
                        <h2 class="text-3xl font-serif italic">${p.name}</h2>
                        <p class="text-2xl text-[#C45508] font-light">${p.price.toLocaleString('pt-MZ')} MT</p>
                        <div class="border-t border-zinc-100 pt-6 space-y-4">
                            <p class="text-xs text-zinc-500 leading-relaxed uppercase tracking-widest">Peça exclusiva Sinha Authentic. Materiais nobres e corte de alta alfaiataria moçambicana.</p>
                            <button class="w-full bg-zinc-900 text-white py-4 font-black uppercase tracking-[0.2em] text-[10px] hover:bg-[#C45508] transition-all">Solicitar via WhatsApp</button>
                        </div>
                    </div>
                </div>
            `;
            modal.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        };

        window.closeProductModal = () => {
            document.getElementById('product-modal-container').classList.add('hidden');
            document.body.style.overflow = 'auto';
        };

        render();
    </script>
</body>
</html>
